eam can read it, approve it, and log it as the canonical response to prohibited queries. This is what 'deterministic, auditable artifact' means — the system's behavior at that branch point is fixed, reviewable, and provable in an audit. The constraint tells the model what not to do; the fallback specifies exactly what to do instead, removing all generative freedom at the most sensitive moment.", "key_insight": "Negative constraints prevent the wrong action; scripted fallbacks make the right action deterministic and provable — and in compliance contexts, provability is the whole point.", "distractors": {"A": {"explanation": "This option argues that stylistic cleanliness and better user experience justify keeping the fallback. That's a real benefit — consistent, professionally worded deflections do improve UX. But 'it reads nicer' is a product preference, not an architectural justification. A compliance reviewer asking for architectural reasons will not be satisfied with aesthetics. The question specifically asks for the *strongest architectural justification*, which requires a structural or systemic reason, not a preference.", "tempting": "It's true that scripted responses are often cleaner than ad-hoc model outputs, so this feels like a legitimate defense.", "fails": "Style is a UX argument, not an architectural one; it doesn't explain why the fallback is structurally necessary from a compliance or system-design standpoint."}, "C": {"explanation": "This option claims that language models are 'known to ignore negative constraints when user intent is sufficiently strong,' making the fallback the *only* reliable mechanism. This overstates the fragility of negative constraints in a way that isn't accurate. Modern large language models like Claude are generally quite reliable at following well-written negative constraints; they don't simply override instructions when users push hard. The real architectural concern isn't that constraints fail entirely — it's that even a *working* constraint still leaves the model free to generate varied, potentially non-compliant phrasing in its refusal. The fallback adds determinism on top of a functioning constraint, not as a last resort against a broken one.", "tempting": "You might have heard that users can 'jailbreak' models through persistent pressure, so it's reasonable to think constraints might fail under determined users.", "fails": "This mischaracterizes how constraint reliability actually works and implies the constraint is fundamentally broken, which is both inaccurate and a weaker justification than the auditability argument in B."}, "D": {"explanation": "This option invents a specific regulatory citation — 'FINRA Rule 2210' — and claims it mandates scripted fallbacks for AI systems. FINRA Rule 2210 governs communications with the public in the brokerage industry, but it does not contain a specific requirement for AI scripted fallbacks as described here. Citing a fabricated or misapplied regulatory requirement is exactly the kind of confident-sounding hallucination that makes this a 'clearly wrong' distractor.", "tempting": "Financial services is heavily regulated, so it feels plausible that some specific rule might require this exact design pattern.", "fails": "The specific regulatory claim is not accurate, and even if a rule existed, 'it's required by regulation' is a legal argument, not an architectural justification for why the design is sound."}}, "memory_anchor": "A negative constraint is like a 'no trespassing' sign; a scripted fallback is like a locked gate — both say 'don't enter,' but only one makes the outcome physically guaranteed and inspectable by an auditor.", "self_check": ["Can you explain in your own words why a model-generated refusal might still create a compliance problem even when the negative constraint is working correctly?", "What does 'deterministic' mean in this context, and why does determinism matter specifically in regulated industries like financial services?", "If a compliance team asks you to prove that your AI assistant never implies it could answer investment questions, which is easier to demonstrate: a negative constraint alone, or a negative constraint plus a scripted fallback? Why?"]}, "being_clear_and_direct_q007": {"question_id": "being_clear_and_direct_q007", "foundation": "Large language models like Claude generate responses by predicting the most likely next token — think of it like autocomplete on steroids — and their behavior is heavily shaped by the instructions they receive. Without explicit guidance, Claude uses statistical patterns from its training to decide what a 'good response' looks like, and for a message containing multiple sub-questions, the model doesn't automatically decompose and enumerate them the way a meticulous human assistant would. This tendency is sometimes called 'satisficing' — the model finds a satisfying answer to the most prominent question it detects and stops there. Think of it like a new employee who answers the first question in your email but misses the two follow-ups buried in the third paragraph: not because they lack ability, but because nobody told them to systematically check for multiple asks. Adding explicit decomposition instructions — 'First identify all distinct questions, then answer each one' — is like giving that employee a checklist that forces them to audit the whole message before typing a single word.", "why_correct": "The core problem here is a missing behavioral instruction, not a missing token budget, a prioritization algorithm, or a persona label. Claude's 40-token system prompt provides no structural guidance about how to handle multi-part inputs, so the model defaults to a common pattern in its training data: answer the most salient question and produce a coherent, finished-looking response. The billing question likely appears first or is statistically most prominent, so Claude treats it as 'the question.' The feature request and bug report never get addressed because the model never received an instruction to look for them. The fix is to add a decomposition step — an explicit instruction that tells Claude to enumerate all distinct questions before answering any of them. This works because language models are highly instruction-following: once you tell Claude to 'first identify all sub-questions,' it activates a structured reasoning pattern rather than a single-question-response pattern. You can think of it like switching a script from greedy mode (grab the first match and return) to exhaustive mode (find all matches, then process). The product manager's intuition — that Claude should 'naturally' handle all sub-questions because the answers are present in the message — confuses capability with default behavior: Claude can address all parts, but it won't self-initiate that structure without being told to.", "key_insight": "Claude has the capability to handle multi-part questions but won't self-initiate systematic decomposition — you have to explicitly instruct it to enumerate sub-questions before answering.", "distractors": {"A": {"explanation": "The context length limit — the maximum number of tokens, or word-pieces, that can fit in a single model input/output — is a real constraint in production systems, but it's completely irrelevant here. The system prompt is only 40 tokens, and a typical support ticket with three sub-questions is still far below any modern model's context window. Truncation due to max_tokens would produce visibly cut-off responses mid-sentence, not a response that cleanly answers one sub-question and ignores the others. The symptoms described — a complete, well-formed answer to only the billing portion — are the signature of a decomposition problem, not a token budget problem.", "tempting": "Token limits are a real API concern, so when output seems 'incomplete,' adjusting max_tokens feels like an obvious lever to pull.", "fails": "The response isn't truncated — it's selectively complete, which points to a behavioral/instruction gap, not a length constraint."}, "C": {"explanation": "Claude does not have a built-in urgency-ranking algorithm that deliberately deprioritizes feature requests or bug reports in favor of billing questions. There is no documented default behavior where Claude assesses ticket severity and consciously chooses to answer only the most urgent item. What's actually happening is more mundane: without decomposition instructions, the model answers what it notices most prominently and produces a finished-looking response. Routing all multi-part tickets to human agents might be a valid escalation policy in some workflows, but it's a business process workaround — not a fix for an addressable prompt engineering problem — and it would add human cost to tickets that Claude is perfectly capable of handling with better instructions.", "tempting": "It sounds like intelligent triage behavior, and 'route complex tickets to humans' is a reasonable real-world escalation policy.", "fails": "Claude isn't prioritizing by urgency — it's simply not being told to enumerate sub-questions, and the 'route to humans' suggestion abandons an easily fixable prompt problem."}, "D": {"explanation": "Persona definitions — instructions like 'You are a helpful support agent' — can shift tone, formality, and domain focus, but they don't fundamentally change whether Claude will enumerate and address every sub-question in a message. A 'helpful support agent' persona might make Claude sound more customer-friendly, but without an explicit decomposition instruction, the model will still latch onto the most prominent sub-question and produce a complete-seeming partial answer. Persona and structural behavior are different dimensions of a system prompt.", "tempting": "If Claude is acting like an incomplete support agent, giving it a 'support agent' role feels like telling it what good support looks like.", "fails": "Persona affects style and domain framing, not the structural behavior of enumerating multiple sub-questions — those require explicit decomposition instructions."}}, "memory_anchor": "Claude won't audit your email for you unless you hand it a checklist — capability without instruction is just potential, not behavior.", "self_check": ["If a system prompt says 'You are a thorough assistant,' will Claude automatically enumerate every sub-question in a multi-part ticket? Why or why not?", "What's the difference between Claude lacking the ability to answer all three sub-questions versus Claude not being instructed to look for them — and how would you distinguish between these two problems in a real system?", "Write a one-sentence addition to a system prompt that would fix the partial-response problem described in this question."]}, "being_clear_and_direct_q008": {"question_id": "being_clear_and_direct_q008", "foundation": "When you call the Claude API, you pay for tokens — think of tokens as roughly three-quarters of a word, or the atomic unit the model reads and writes. Billing is based on *input tokens* (everything you send in your prompt) plus *output tokens* (everything Claude writes back), and crucially, you are charged for every output token Claude generates, not just the ones you choose to display to a user. Chain-of-thought (CoT) prompting is a technique where you instruct the model to 'think out loud' — to enumerate sub-problems or reasoning steps before arriving at a final answer, much like asking a math student to show their work. The hidden misconception this question targets is the idea that post-processing (stripping text after the API responds) is like cutting pages from a book before the printer charges you — it isn't. The printer already ran, the ink already dried, and you already owe for every page.", "why_correct": "The proposal rests on a faulty assumption: that hiding reasoning from the customer also hides it from the billing meter. It does not. When Claude writes out its chain-of-thought enumeration, those tokens exist in the completion — they are generated, they are returned by the API, and they are counted toward your output token bill before your post-processing script ever sees the response. Stripping them afterward is like ordering a full restaurant meal, eating the appetizers in the kitchen, and only bringing the entrée to the table — you still pay for the full order. So the 'cost savings' the proposal advertises are illusory: you pay for the reasoning tokens either way. What the proposal *does* add is real implementation complexity: you now have a post-processing layer to build, test, maintain, and debug, plus an extra step that can introduce bugs (what if the stripping regex misfires and deletes part of the real answer?). Compare this to the alternative: simply include the chain-of-thought instructions directly and let the full response reach the customer, or restructure the prompt to get complete answers without explicit enumeration. Either alternative costs the same in tokens and involves far less engineering overhead. The correct answer (C) captures this precisely — the complexity cost is real, the savings are not.", "key_insight": "You are billed for every token Claude generates, not every token your customer reads — post-processing is a display filter, not a billing filter.", "distractors": {"A": {"explanation": "Option A treats the API like a streaming video service where you only pay for the minutes you watch. In reality, token billing works like a printing service: the moment Claude finishes generating a response, every token in that response is counted, regardless of what you do with the text afterward. Stripping the enumeration step in post-processing does *not* reduce the token count that was already measured. This option also assumes 'response completeness' is preserved, which is plausible — but the cost-saving justification is simply factually incorrect.", "tempting": "It feels intuitive that if the customer never sees the reasoning, you shouldn't have to pay for it.", "fails": "Output tokens are counted at generation time, not at display time — the billing already happened before your post-processing script runs."}, "B": {"explanation": "Option B sounds architecturally sophisticated — it distinguishes between server-side and client-side processing, which is a real and important distinction in production systems for reasons like latency, security, and data handling. However, it imports this legitimate concern into a context where it's irrelevant: the core flaw in the proposal isn't *where* you strip the text, it's that stripping doesn't reduce token costs at all. Whether your post-processing runs on the server in 2ms or on the client in 50ms, you already paid for those reasoning tokens. This answer is a 'near-miss' because it sounds like careful engineering thinking while completely missing the fundamental billing issue.", "tempting": "Server-side vs. client-side processing is a real architectural concern, so this sounds like a nuanced, expert-level refinement.", "fails": "Latency of stripping is irrelevant because the token cost is incurred at generation time regardless of where or when you strip the output."}, "D": {"explanation": "Option D states that chain-of-thought instructions must be placed in the user turn and cannot be in the system prompt — this is simply not true. The system prompt is designed for persistent, high-level instructions that frame how Claude should behave across the entire conversation, and 'show your reasoning step by step' is a perfectly valid system-level instruction. You can absolutely include CoT guidance in the system prompt, and it functions correctly there.", "tempting": "There are some prompting conventions about where certain instructions work best, so it seems plausible there might be a placement restriction.", "fails": "There is no API rule preventing chain-of-thought instructions in the system prompt; this is a fabricated constraint."}}, "memory_anchor": "Post-processing is a scissors that cuts the paper after the printer already ran — Claude's token bill is finalized the moment the last reasoning token is generated, not the moment a customer reads the response.", "self_check": ["If Claude writes a 300-token chain-of-thought block and you strip it before sending to the customer, how many output tokens are you billed for — 300 or 0?", "What is the actual cost the proposal introduces that the correct answer identifies — and why does that cost exist even if the token savings were real?", "Can you think of a scenario where post-processing a Claude response *would* save meaningful cost? (Hint: think about caching or restructuring prompts to generate less in the first place.)"]}};
const LESSON    = "being_clear_and_direct";
const N         = 8;

// ── State ───────────────────────────────────────────────────────────────────
let current  = 0;
let answered = new Array(N).fill(null);   // null = unanswered, letter = chosen
let correct  = 0;

// ── localStorage performance tracking ───────────────────────────────────────
const STORAGE_KEY = "cca_perf_" + LESSON;

function loadPerf() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function savePerf(perf) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(perf)); }
  catch(e) {}
}

function recordAnswer(qid, chosen, isCorrect) {
  const perf = loadPerf();
  if (!perf[qid]) perf[qid] = { attempts: 0, correct: 0, last: null };
  perf[qid].attempts += 1;
  if (isCorrect) perf[qid].correct += 1;
  perf[qid].last = chosen;
  savePerf(perf);
}

// ── Difficulty badge helper ──────────────────────────────────────────────────
function diffBadge(d) {
  if (!d) return "";
  const cls = d === "foundational" ? "badge-found"
            : d === "intermediate" ? "badge-inter"
            : "badge-arch";
  return `<span class="badge ${cls}">${d}</span>`;
}

// ── Render current question ──────────────────────────────────────────────────
function render() {
  const q   = QUESTIONS[current];
  const ans = answered[current];
  const brief_data = BRIEF[q.id] || {};
  const arch_data  = ARCHITECT[q.id] || {};
  const novice_data = NOVICE[q.id] || {};

  const letters = ["A","B","C","D"];

  let opts_html = "";
  letters.forEach(ltr => {
    const txt = (q.options || {})[ltr] || "";
    if (!txt) return;
    let cls = "opt-btn";
    let disabled = "";
    if (ans !== null) {
      disabled = "disabled";
      if (ltr === q.correct) cls += " correct";
      else if (ltr === ans && ans !== q.correct) cls += " wrong";
    }
    opts_html += `<button class="${cls}" ${disabled} onclick="choose('${ltr}')" aria-label="Option ${ltr}">
      <span class="opt-letter">${ltr}.</span>
      <span>${txt}</span>
    </button>`;
  });

  // Brief explanation text
  let brief_text = "";
  if (ans !== null && brief_data.correct_explanation) {
    const wrong_exp = (brief_data.distractor_explanations || {})[ans] || "";
    if (ans === q.correct) {
      brief_text = `<strong>&#10003; Correct.</strong> ${brief_data.correct_explanation}`;
    } else {
      brief_text = `<strong>&#10005; Incorrect.</strong> ${wrong_exp}<br><br>`
                 + `<strong>Correct answer (${q.correct}):</strong> ${brief_data.correct_explanation}`;
    }
  }

  // Architect text
  let arch_text = "";
  if (arch_data.why_correct) {
    arch_text = `<strong>Why ${q.correct} is correct:</strong> ${arch_data.why_correct}<br><br>`;
    if (arch_data.mental_model) {
      arch_text += `<strong>Mental model:</strong> ${arch_data.mental_model}`;
    }
  } else {
    arch_text = "Architect-level explanation not available.";
  }

  // Novice text
  let novice_text = "";
  if (novice_data.foundation) {
    novice_text = `<strong>Foundation:</strong> ${novice_data.foundation}<br><br>`;
    if (novice_data.key_insight) {
      novice_text += `<strong>Key insight:</strong> ${novice_data.key_insight}<br><br>`;
    }
    if (novice_data.memory_anchor) {
      novice_text += `<em>${novice_data.memory_anchor}</em>`;
    }
  } else {
    novice_text = "Novice explanation not available.";
  }

  const exp_show = ans !== null ? "show" : "";

  document.getElementById("quiz-area").innerHTML = `
    <div class="card">
      <div class="card-meta">
        <span class="q-num">Q${current+1}</span>
        <span class="badge badge-domain">${q.domain || ""}</span>
        ${diffBadge(q.difficulty)}
        <span class="badge badge-type">${q.type || ""}</span>
      </div>
      <div class="stem">${q.stem || ""}</div>
      <div class="options">${opts_html}</div>
      <div class="explanation ${exp_show}" id="exp-area">
        <div class="brief-exp" id="brief-exp">${brief_text}</div>
        <div class="detail-btns">
          <button class="detail-btn" id="btn-arch" onclick="toggleDetail('arch')">
            &#128736; Architect explanation
          </button>
          <button class="detail-btn" id="btn-nov" onclick="toggleDetail('nov')">
            &#128218; Beginner explanation
          </button>
        </div>
        <div class="detail-content architect-content" id="detail-arch">${arch_text}</div>
        <div class="detail-content novice-content" id="detail-nov">${novice_text}</div>
      </div>
    </div>`;

  // Navigation state
  document.getElementById("q-counter").textContent =
    `Question ${current+1} of ${N}`;
  document.getElementById("prev-btn").disabled = current === 0;
  document.getElementById("next-btn").disabled = current === N - 1;

  updateProgress();
}

// ── Answer selection ─────────────────────────────────────────────────────────
function choose(letter) {
  if (answered[current] !== null) return;
  answered[current] = letter;
  const q = QUESTIONS[current];
  const isCorrect = letter === q.correct;
  if (isCorrect) correct++;
  recordAnswer(q.id, letter, isCorrect);
  render();

  // Show summary if all answered
  if (answered.every(a => a !== null)) showSummary();
}

// ── Detail toggle ────────────────────────────────────────────────────────────
function toggleDetail(which) {
  const arch = document.getElementById("detail-arch");
  const nov  = document.getElementById("detail-nov");
  const bA   = document.getElementById("btn-arch");
  const bN   = document.getElementById("btn-nov");

  if (which === "arch") {
    const showing = arch.classList.contains("show");
    arch.classList.toggle("show", !showing);
    nov.classList.remove("show");
    bA.classList.toggle("active", !showing);
    bN.classList.remove("active");
  } else {
    const showing = nov.classList.contains("show");
    nov.classList.toggle("show", !showing);
    arch.classList.remove("show");
    bN.classList.toggle("active", !showing);
    bA.classList.remove("active");
  }
}

// ── Navigation ───────────────────────────────────────────────────────────────
function navigate(dir) {
  current = Math.max(0, Math.min(N - 1, current + dir));
  render();
}

// ── Progress bar ─────────────────────────────────────────────────────────────
function updateProgress() {
  const done = answered.filter(a => a !== null).length;
  const pct  = done / N * 100;
  document.getElementById("bar").style.width = pct + "%";
  document.getElementById("score-display").textContent =
    correct + " / " + done + " correct";
}

// ── Summary ──────────────────────────────────────────────────────────────────
function showSummary() {
  const el  = document.getElementById("summary");
  el.classList.add("show");
  const pct = Math.round(correct / N * 100);
  const icon = pct >= 80 ? "&#10003; " : pct >= 60 ? "~ " : "&#10005; ";
  document.getElementById("final-score").innerHTML =
    icon + correct + "/" + N + " (" + pct + "%)";
  el.scrollIntoView({ behavior: "smooth", block: "start" });
}

// ── Init ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
